<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PyMentor - Loading</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background-color: #09090b; /* Zinc 950 - matches Next.js dark theme */
      color: #fafafa;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      overflow: hidden;
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
    }

    .icon {
      width: 64px;
      height: 64px;
      color: #3b82f6; /* Blue 500 */
      filter: drop-shadow(0 0 12px rgba(59, 130, 246, 0.5));
    }

    .title {
      font-size: 56px;
      font-weight: 700;
      letter-spacing: -1px;
    }

    /* Shimmering animation on title */
    .shimmer {
      background: linear-gradient(
        90deg,
        rgba(255, 255, 255, 1) 0%,
        rgba(255, 255, 255, 0.3) 50%,
        rgba(255, 255, 255, 1) 100%
      );
      background-size: 200% auto;
      color: transparent;
      -webkit-background-clip: text;
      background-clip: text;
      animation: shimmer 2.5s linear 1 forwards;
    }

    @keyframes shimmer {
      to {
        background-position: 200% center;
      }
    }

    .progress-container {
      width: 280px;
      height: 4px;
      background-color: #27272a; /* Zinc 800 */
      border-radius: 4px;
      overflow: hidden;
      position: relative;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background-color: #3b82f6; /* Blue 500 */
      border-radius: 4px;
      position: absolute;
      left: 0;
      top: 0;
      animation: load 4s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
      box-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
    }

    @keyframes load {
      0% {
        width: 0%;
      }
      20% {
        width: 35%;
      }
      60% {
        width: 65%;
      }
      80% {
        width: 85%;
      }
      100% {
        width: 98%;
      }
    }
  </style>
</head>
<body>
  <div class="logo-container">
    <!-- Lucide Terminal Icon SVG -->
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="icon">
      <polyline points="4 17 10 11 4 5"></polyline>
      <line x1="12" y1="19" x2="20" y2="19"></line>
    </svg>
    <span class="title shimmer">PyMentor</span>
  </div>
  
  <div class="progress-container">
    <div class="progress-bar"></div>
  </div>
</body>
</html>
